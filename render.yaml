services:
  - type: web
    name: pravado-api
    runtime: node
    region: oregon
    plan: starter
    branch: main
    healthCheckPath: /health
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @pravado/api build
    startCommand: pnpm --filter @pravado/api start:prod
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: API_HOST
        value: "0.0.0.0"
      - key: API_PORT
        value: "10000"
